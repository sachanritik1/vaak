name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-mac:
    name: macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-latest
            arch: arm64
          - runs-on: macos-15-intel
            arch: x64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Configure node-gyp
        run: |
          PY="$(command -v python3)"
          echo "PYTHON=$PY" >> "$GITHUB_ENV"
          echo "npm_config_python=$PY" >> "$GITHUB_ENV"
          "$PY" -c "from distutils.version import StrictVersion; print('node-gyp ok:', '$PY')"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and main
        run: npm run build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          arch='${{ matrix.arch }}'
          signed=false
          if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ]; then
            signed=true
            echo "Developer ID signing enabled"
          else
            echo "Ad-hoc signing (no Apple Developer certificate)"
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
          fi

          if [ "$signed" = true ]; then
            npx electron-builder \
              --mac dmg \
              --"$arch" \
              --publish always \
              --config.npmRebuild=false
            exit 0
          fi

          # Unsigned path: pack → ad-hoc sign natives (CI was applying hardened-runtime
          # entitlements with ad-hoc identity, producing a broken signature → "damaged").
          npx electron-builder \
            --mac dir \
            --"$arch" \
            --publish never \
            --config.npmRebuild=false \
            --config.mac.identity=null \
            --config.mac.hardenedRuntime=false \
            --config.mac.gatekeeperAssess=false

          app="$(find release -path '*/Vaak.app' -type d | head -1)"
          if [ -z "$app" ]; then
            echo "Vaak.app not found under release/" >&2
            find release -maxdepth 3 || true
            exit 1
          fi

          chmod +x scripts/sign-mac-adhoc.sh
          scripts/sign-mac-adhoc.sh "$app"

          npx electron-builder \
            --mac dmg \
            --"$arch" \
            --publish always \
            --prepackaged "$app" \
            --config.npmRebuild=false \
            --config.mac.identity=null \
            --config.mac.hardenedRuntime=false \
            --config.mac.gatekeeperAssess=false
