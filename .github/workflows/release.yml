name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-mac:
    name: macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-latest
            arch: arm64
          - runs-on: macos-15-intel
            arch: x64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Configure node-gyp
        run: |
          PY="$(command -v python3)"
          echo "PYTHON=$PY" >> "$GITHUB_ENV"
          echo "npm_config_python=$PY" >> "$GITHUB_ENV"
          "$PY" -c "from distutils.version import StrictVersion; print('node-gyp ok:', '$PY')"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and main
        run: npm run build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          args=(
            --mac dmg
            --"${{ matrix.arch }}"
            --publish always
            --config.npmRebuild=false
          )
          # An empty CSC_LINK secret makes electron-builder treat the repo root as a
          # certificate path ("…/vaak not a file"). Only sign when fully configured.
          if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ]; then
            echo "Code signing enabled"
          else
            echo "Building unsigned (no or incomplete signing secrets)"
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            args+=(--config.mac.hardenedRuntime=false)
          fi
          npx electron-builder "${args[@]}"
