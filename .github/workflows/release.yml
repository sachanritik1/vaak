name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-latest
            arch: arm64
          - runs-on: macos-15-intel
            arch: x64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # node-gyp needs distutils (removed in Python 3.12+). Pin 3.11 on PATH so
      # postinstall/electron-builder pick it up — venv/npm config alone is ignored
      # by electron-builder's bundled @electron/rebuild.
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Verify node-gyp Python
        run: python3 -c "from distutils.version import StrictVersion; print('node-gyp python ok')"

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ARGS="--mac dmg --${{ matrix.arch }}"
          if [ -n "$CSC_LINK" ]; then
            npm run release -- $ARGS
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npm run release -- $ARGS --config.mac.hardenedRuntime=false
          fi
