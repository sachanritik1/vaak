name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # node-gyp (used by @electron/rebuild) needs distutils; removed in Python 3.12+.
      # electron-builder rebuilds per target arch (arm64 + x64), so Python must be set
      # for the entire job — not only during npm ci.
      - name: Prepare node-gyp Python
        run: |
          python3 -m venv .venv-native
          .venv-native/bin/pip install setuptools
          PY="${{ github.workspace }}/.venv-native/bin/python"
          echo "PYTHON=$PY" >> "$GITHUB_ENV"
          echo "npm_config_python=$PY" >> "$GITHUB_ENV"
          npm config set python "$PY"
          echo "python=$PY" >> .npmrc
          "$PY" -c "from distutils.version import StrictVersion; print('node-gyp python ok')"

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            npm run release -- --mac dmg --arm64 --x64
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npm run release -- --mac dmg --arm64 --x64 --config.mac.hardenedRuntime=false
          fi
